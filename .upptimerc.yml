# Upptime configuration — see https://upptime.js.org/docs/configuration
owner: qado-ai
repo: status.qado.ai

sites:
  - name: qado Platform
    url: https://core.qado.ai/api-v2/health
    expectedStatusCodes:
      - 200
  - name: Authentication (WorkOS AuthKit)
    url: https://auth.qado.ai
    expectedStatusCodes:
      - 200

status-website:
  cname: status.qado.ai
  logoUrl: https://core.qado.ai/favicon.ico
  name: qado Status
  introTitle: "**qado** platform status"
  introMessage: Live uptime and incident history for the qado platform ([core.qado.ai](https://core.qado.ai)) and its authentication provider. Monitored every 5 minutes via GitHub Actions.
  navbar:
    - title: Status
      href: /
    - title: App
      href: https://core.qado.ai
  theme: light

# Incidents are GitHub Issues in this repo — label an issue with the site slug
# (e.g. "qado-platform") plus "status" to surface it on the page.
